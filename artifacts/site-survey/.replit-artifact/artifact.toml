kind = "web"
previewPath = "/"
title = "Site Survey Data Collection"
version = "1.0.0"
id = "artifacts/site-survey"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23696

[services.development]
run = "pnpm --filter @workspace/site-survey run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/site-survey", "run", "build" ]
publicDir = "artifacts/site-survey/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23696"
BASE_PATH = "/"
