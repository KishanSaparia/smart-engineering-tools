kind = "web"
previewPath = "/"
title = "Electrical Survey Tool"
version = "1.0.0"
id = "artifacts/survey-tool"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20715

[services.development]
run = "pnpm --filter @workspace/survey-tool run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/survey-tool", "run", "build" ]
publicDir = "artifacts/survey-tool/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20715"
BASE_PATH = "/"
